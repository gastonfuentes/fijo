<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="c">
      <circle cx="16" cy="16" r="10"/>
    </clipPath>
  </defs>
  <!-- Fondo verde -->
  <rect width="32" height="32" rx="6" fill="#16a34a"/>
  <!-- Pelota blanca -->
  <circle cx="16" cy="16" r="10" fill="white"/>
  <!-- Parches negros, recortados al circulo -->
  <g clip-path="url(#c)" fill="#1a1a1a">
    <!-- Pentagono central (arriba) -->
    <polygon points="16,10.5 19.3,12.6 18.2,16.1 13.8,16.1 12.7,12.6"/>
    <!-- Parche derecho -->
    <polygon points="19.3,12.6 30,8 30,20 23,18.5 18.2,16.1"/>
    <!-- Parche inferior izquierdo -->
    <polygon points="13.8,16.1 18.2,16.1 16,30 6,28 4,18"/>
    <!-- Parche superior izquierdo -->
    <polygon points="12.7,12.6 16,10.5 14,2 4,5 3,14"/>
    <!-- Parche superior derecho -->
    <polygon points="16,10.5 19.3,12.6 28,4 22,2 14,2"/>
    <!-- Parche inferior derecho -->
    <polygon points="19.3,12.6 23,18.5 28,28 18,30 16,30 18.2,16.1"/>
    <!-- Parche izquierdo -->
    <polygon points="12.7,12.6 4,14 4,18 13.8,16.1"/>
  </g>
  <!-- Borde sutil de la pelota -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#e5e7eb" stroke-width="0.4"/>
</svg>
